<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>行事曆</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{--bg:#cdd9d0;--sf:#dce8de;--sf2:#d4e1d6;--sf3:#e8f1ea;--bd:#b8ccbc;--bd2:#a4bcaa;--ac:#3a6b45;--acl:#c6deca;--tx:#1c2d20;--mu:#5c7a62;--mu2:#8faa95;--red:#b83232;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Sans TC','PingFang TC',sans-serif;min-height:100vh;}
.page{display:flex;flex-direction:column;min-height:100vh;padding:20px 16px 60px;}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.month-block{margin-right:auto;}
.label-tag{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#b06000;display:flex;align-items:center;gap:6px;}
.label-tag::before{content:'';width:14px;height:2px;background:#b06000;border-radius:2px;}
.month-title{font-family:'Syne',sans-serif;font-size:clamp(38px,5vw,64px);font-weight:800;line-height:1.1;color:#152a18;}
.month-title span{color:#2a6e38;}
.nav-group{display:flex;align-items:center;gap:6px;}
.nav-btn{height:38px;padding:0 16px;border:2px solid #5a9a60;background:#fff;color:#1a5020;border-radius:20px;cursor:pointer;font-size:14px;font-weight:700;transition:all .15s;}
.nav-btn:hover{background:#2a7040;color:#fff;border-color:#1a6030;}
.nav-btn.circle{width:38px;padding:0;border-radius:50%;font-size:17px;}
.quick-wrap{position:relative;}
.quick-trigger{display:flex;align-items:center;gap:5px;background:#fff8e6;border:2px solid #d4900a;color:#7a4800;height:38px;padding:0 16px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.quick-trigger:hover,.quick-trigger.open{background:#d4900a;color:#fff;}
.quick-dd{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:2px solid #d4900a;border-radius:10px;overflow:hidden;z-index:400;min-width:170px;box-shadow:0 8px 24px rgba(180,100,0,.18);}
.quick-dd.show{display:block;}
.qopt{padding:12px 18px;font-size:15px;font-weight:500;cursor:pointer;border-bottom:1px solid #f5e0b0;white-space:nowrap;color:#5a3800;}
.qopt:last-child{border-bottom:none;}
.qopt:hover{background:#fff3cc;}
.ov-group{display:flex;gap:12px;align-items:center;}
.ov-label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:14px;font-weight:700;color:#2a5c30;}
.ov-label input[type=checkbox]{appearance:none;-webkit-appearance:none;width:19px;height:19px;border-radius:5px;border:2px solid #6aaa72;background:#fff;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0;}
.ov-label input:checked{background:#2a7040;border-color:#1a5028;}
.ov-label input:checked::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff;}
.csg-logo{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:3px;background:#fff;border:1px solid #b8ccbc;overflow:hidden;flex-shrink:0;padding:1px;}
.asml-logo{display:inline-flex;align-items:center;justify-content:center;height:20px;width:66px;background:#fff;border:1px solid #b8ccbc;border-radius:3px;overflow:hidden;flex-shrink:0;padding:2px 3px;}
.cal-wrap{flex:1;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.weekday{background:var(--sf3);text-align:center;padding:9px 0;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--mu);border-radius:4px;}
.weekday:first-child,.weekday:last-child{color:var(--red);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{background:var(--sf);border:1.5px solid var(--bd);border-radius:5px;min-height:clamp(110px,10.5vw,155px);padding:6px 6px 4px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:border-color .14s,background .14s;overflow:hidden;}
.day-cell:hover{border-color:var(--ac);background:var(--acl);}
.day-cell.other{background:var(--sf2);opacity:.72;}
.day-cell.other .day-num{color:var(--mu2);}
.day-cell.weekend .day-num,.day-cell.holiday .day-num{color:var(--red);}
.day-cell.today{border-color:var(--ac);border-width:2px;}
.day-cell.today .day-num{background:var(--ac);color:#fff;}
.cell-head{display:flex;align-items:flex-start;gap:4px;margin-bottom:1px;flex-wrap:wrap;}
.day-num{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;width:27px;height:27px;display:grid;place-items:center;border-radius:50%;flex-shrink:0;}
.hday-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;line-height:1.5;white-space:nowrap;align-self:center;}
.lunar{font-size:9px;color:var(--mu);line-height:1.3;}
.shift-pill{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0;white-space:nowrap;}
.evt-pill{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;flex-shrink:0;color:#1a1a1a;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;}
.more{font-size:9px;color:var(--mu);padding-left:3px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(28,45,32,.45);z-index:600;align-items:center;justify-content:center;padding:14px;}
.overlay.show{display:flex;}
.modal{background:var(--sf3);border:1.5px solid var(--bd2);border-radius:14px;width:100%;max-width:500px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(28,45,32,.22);animation:fadeUp .2s ease;}
.modal-hd{padding:16px 20px 12px;border-bottom:1.5px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;border-radius:14px 14px 0 0;}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:var(--tx);}
.modal-sub{font-size:12px;color:var(--mu);margin-top:3px;}
.modal-x{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1;}
.modal-x:hover{color:var(--red);}
.modal-body{padding:14px 20px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;flex:1;border-radius:0 0 14px 14px;}
.flabel{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ac);margin-bottom:4px;display:block;}
.sublabel{font-size:11px;color:var(--mu);margin-bottom:4px;display:block;}
.finput{width:100%;background:var(--sf);border:1.5px solid var(--bd2);color:var(--tx);padding:9px 12px;border-radius:7px;font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.finput:focus{border-color:var(--ac);}
select.finput{cursor:pointer;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.time-row{display:flex;gap:5px;align-items:center;}
.time-row select{flex:1;}
.time-colon{font-size:16px;color:var(--mu);font-weight:700;flex-shrink:0;}
.color-grid{display:flex;flex-wrap:wrap;gap:5px;}
.cswatch{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;flex-shrink:0;display:grid;place-items:center;font-size:13px;font-weight:900;}
.cswatch:hover{transform:scale(1.2);}
.cswatch.sel{border-color:#333;transform:scale(1.15);}
.cswatch.sel::after{content:'✓';}
.evt-list{display:flex;flex-direction:column;gap:3px;}
.evt-item{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;background:var(--sf);border:1.5px solid var(--bd);cursor:pointer;}
.evt-item:hover{border-color:var(--ac);background:var(--acl);}
.ei-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ei-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ei-meta{font-size:10px;color:var(--mu);flex-shrink:0;}
.ei-del{background:none;border:none;color:var(--mu2);font-size:19px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;}
.ei-del:hover{color:var(--red);}
.hosp-form{background:var(--sf);border:1.5px solid var(--bd);border-radius:9px;padding:12px;display:flex;flex-direction:column;gap:10px;}
.doc-row{display:flex;gap:7px;align-items:center;}
.doc-row input{flex:1;}
.btn-cgmh{display:inline-flex;align-items:center;background:#1a5040;color:#fff;border:none;padding:9px 12px;border-radius:7px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.btn-cgmh:hover{background:#0e3028;}
.detail-card{background:var(--sf);border-radius:9px;padding:13px;border:1.5px solid var(--bd);}
.drow{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;}
.drow:last-child{margin-bottom:0;}
.dkey{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--mu);letter-spacing:.09em;min-width:46px;padding-top:2px;}
.dval{font-size:13px;color:var(--tx);flex:1;}
.divider{height:1px;background:var(--bd);}
.btn-ok{width:100%;background:var(--ac);color:#fff;border:none;padding:12px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:15px;cursor:pointer;flex-shrink:0;}
.btn-ok:hover{opacity:.87;}
.btn-del{width:100%;background:transparent;color:var(--mu);border:1.5px solid var(--bd2);padding:10px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.btn-del:hover{border-color:var(--red);color:var(--red);}
.range-del-label{display:flex;align-items:flex-start;gap:7px;padding:9px 12px;background:#fff8f0;border:1.5px solid #f0b070;border-radius:8px;cursor:pointer;font-size:12px;color:#7a3800;line-height:1.5;}
.range-del-label input[type=checkbox]{appearance:none;-webkit-appearance:none;width:17px;height:17px;border-radius:4px;border:2px solid #e08030;background:#fff;cursor:pointer;position:relative;flex-shrink:0;margin-top:1px;}
.range-del-label input:checked{background:#d06820;border-color:#a04000;}
.range-del-label input:checked::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;font-size:10px;font-weight:900;color:#fff;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.map-result-item{padding:11px 16px;border-bottom:1px solid var(–bd);display:flex;align-items:center;gap:10px;transition:background .12s;}
.map-result-item:last-child{border-bottom:none;}
.map-result-item:hover{background:var(–acl);}
.map-result-info{flex:1;min-width:0;}
.map-result-name{font-size:14px;font-weight:700;color:var(–tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.map-result-addr{font-size:11px;color:var(–mu);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.map-result-dist{font-size:11px;color:var(–ac);font-weight:700;flex-shrink:0;}
.map-result-btn{background:var(–ac);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap;}
.map-no-result{padding:24px 16px;text-align:center;color:var(–mu);font-size:13px;line-height:1.7;}
.map-loading{padding:24px 16px;text-align:center;color:var(–mu);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.map-spinner{width:28px;height:28px;border:3px solid var(–bd);border-top-color:var(–ac);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:600px){.day-cell{min-height:72px;padding:4px 3px;}.day-num{font-size:12px;width:22px;height:22px;}.evt-pill{font-size:8px;}.lunar{display:none;}.controls{gap:8px;}}
</style>

</head>
<body>
<div class="page">
  <div class="controls">
    <div class="month-block">
      <div class="label-tag">行事曆</div>
      <div class="month-title" id="monthTitle">2026 <span>四月</span></div>
    </div>
    <div class="quick-wrap" id="quickWrap">
      <button class="quick-trigger" id="quickTrigger">★ 常用行程</button>
      <div class="quick-dd" id="quickDd">
        <div class="qopt" data-name="醫院門診" data-color="#2e7d6e" data-type="hospital">🏥 醫院門診</div>
        <div class="qopt" data-name="醫院領藥" data-color="#1a6b5a" data-type="hospital">💊 醫院領藥</div>
        <div class="qopt" data-name="西港" data-color="#b5860d" data-type="place">📍 西港</div>
        <div class="qopt" data-name="鳳山" data-color="#b5860d" data-type="place">📍 鳳山</div>
        <div class="qopt" data-name="聚餐" data-color="#b83232" data-type="dine">🍽 聚餐</div>
        <div class="qopt" data-name="出遊" data-color="#5c35b0" data-type="trip">🚗 出遊</div>
      </div>
    </div>
    <div class="ov-group">
      <label class="ov-label">
        <input type="checkbox" id="ovCsg"/>
        <span class="csg-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 264"><path fill="rgb(42,111,160)" d="M33.6 99.7v64.7h33v33.5H0V66.2h66.6v33.5zm173.4-33.5v131.7h-66.6v-33.5h33v-64.7h-33V66.2zm-80.6 33.5V33.2h-12.8v70.6l11.2 11 1.6 1.5L160 149.3V264.1H80V131.4l33.6 33v66.5h12.8v-70.6l-11.2-11-1.6-1.5L80 114.8V0h80v132.7z"/></svg></span>
        <span>中鋼班表</span>
      </label>
      <label class="ov-label">
        <input type="checkbox" id="ovAsml"/>
        <span class="asml-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1065 300"><g transform="translate(-353.3275,-273.78)"><polygon points="1065.83,566.929 1102.68,388.346 1116.71,566.929 1196.223,566.929 1159.373,283.464 1074.333,283.464 1034.646,453.542 994.964,283.464 909.924,283.464 873.072,566.929 952.443,566.929 966.617,388.346 1003.468,566.929" fill="#0f238c"/><polygon points="1312.442,283.464 1235.907,283.464 1235.907,566.929 1417.324,566.929 1417.324,507.401 1312.442,507.401" fill="#0f238c"/><path d="m535.749,283.464-96.379,0-85.039,283.465 85.04,0 11.338,-51.023 73.701,0 11.339,51.023 85.04,0-85.04,-283.465zm-48.189,62.362 25.512,116.22-51.024,0.001 25.512,-116.221z" fill="#0f238c"/><path d="m824.881,362.835c-70.432,-61.604-180.339,-36.558-181.417,19.843-15.981,-104.645 110.563,-126.492 181.41,-93.544 1.262,16.802 2.527,34.892 0.007,73.701z" fill="#0f238c"/><path d="m766.445,396.213c-17.745,-6.926-43.562,-13.227-43.599,-33.403-0.015,-8.241 3.375,-17.189 19.83,-22.651-56.693,5.669-75.599,74.633-12.896,108.91 10.928,5.974 29.904,12.311 29.904,32.82 0,23.957-26.32,32.617-43.634,32.251-28.761,-0.605-51.885,-10.652-78.256,-29.417l0,68.032c31.207,13.434 82.039,28.928 132.996,13.256 41.183,-12.666 76.768,-47.236 76.768,-84.123 0.002,-60.022-52.091,-74.346-81.113,-85.675z" fill="#0f238c"/></g></svg></span>
      </label>
    </div>
    <div class="nav-group">
      <button class="nav-btn circle" id="prevBtn">←</button>
      <button class="nav-btn" id="todayBtn">今天</button>
      <button class="nav-btn circle" id="nextBtn">→</button>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="weekdays"><div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>
<div class="overlay" id="dayModal"><div class="modal">
  <div class="modal-hd"><div><div class="modal-title" id="mTitle"></div><div class="modal-sub" id="mSub">點擊行程查看詳情</div></div><button class="modal-x" id="mClose">✕</button></div>
  <div class="modal-body">
    <div id="existSec" style="display:none"><label class="flabel">已有行程</label><div class="evt-list" id="evtList"></div><div class="divider" style="margin-top:8px;"></div></div>
    <div><label class="flabel">行程類型</label><select class="finput" id="evtType"><option value="normal">一般行程</option><option value="hospital">🏥 醫院門診</option><option value="medicine">💊 醫院領藥</option></select></div>
    <div id="nameRow"><label class="flabel">行程名稱</label><input class="finput" id="evtName" placeholder="輸入行程名稱..." autocomplete="off"/></div>
    <div class="hosp-form" id="hospForm" style="display:none;">
      <label class="flabel" style="color:#2e7d6e;">醫院門診資訊</label>
      <div><label class="sublabel">醫院</label><select class="finput" id="hHosp"><option value="">— 選擇醫院 —</option><option value="8">高雄長庚紀念醫院</option><option value="T">高雄市立鳳山醫院</option><option value="other">其他</option></select></div>
      <div id="hOtherRow" style="display:none;"><label class="sublabel">醫院名稱</label><input class="finput" id="hOtherName" placeholder="請輸入醫院名稱"/></div>
      <div id="hDeptRow" style="display:none;"><label class="sublabel">科別</label><select class="finput" id="hDept"><option value="">— 選擇科別 —</option></select></div>
      <div id="hDeptTextRow" style="display:none;"><label class="sublabel">科別</label><input class="finput" id="hDeptText" placeholder="科別（自行輸入）"/></div>
      <div><label class="sublabel">醫師</label><div class="doc-row"><input class="finput" id="hDoctorText" placeholder="醫師姓名（自行輸入）"/><a id="hDocLink" class="btn-cgmh" href="#" target="_blank" rel="noopener" style="display:none;">🔗 查醫師</a></div></div>
      <div class="row2"><div><label class="sublabel">看診號碼</label><input class="finput" id="hNum" placeholder="e.g. 18"/></div><div><label class="sublabel">時間</label><div class="time-row"><select class="finput" id="hHr"></select><span class="time-colon">:</span><select class="finput" id="hMn"></select></div></div></div>
    </div>
    <div><label class="flabel">日期區間</label><div class="row2"><div><label class="sublabel">開始日期</label><input class="finput" type="date" id="evtS"/></div><div id="evtEWrap"><label class="sublabel">結束日期（選填）</label><input class="finput" type="date" id="evtE"/></div></div></div>
    <div id="timeRow"><label class="flabel">時間（選填）</label><div class="time-row"><select class="finput" id="evtHr"></select><span class="time-colon">:</span><select class="finput" id="evtMn"></select></div></div>
    <div id="colorRow"><label class="flabel">顏色（50色）</label><div class="color-grid" id="colorGrid"></div></div>
    <button class="btn-ok" id="addBtn">＋ 新增行程</button>
  </div>
</div></div>
<div class="overlay" id="detModal"><div class="modal" style="max-width:400px;">
  <div class="modal-hd"><div><div class="modal-title" id="detTitle"></div><div class="modal-sub" id="detSub"></div></div><button class="modal-x" id="detClose">✕</button></div>
  <div class="modal-body"><div class="detail-card" id="detCard"></div><div id="detRangeOpt" style="display:none;"><label class="range-del-label"><input type="checkbox" id="detDelRange"/><span>同時刪除整段區間行程（<span id="detRangeSpan"></span>）</span></label></div><button class="btn-del" id="detDel">🗑 刪除此行程</button></div>
</div></div>
<div class="overlay" id="quickModal"><div class="modal" style="max-width:420px;">
  <div class="modal-hd"><div><div class="modal-title" id="qTitle">新增快速行程</div><div class="modal-sub">選擇日期後確認</div></div><button class="modal-x" id="qClose">✕</button></div>
  <div class="modal-body">
    <div class="hosp-form" id="qHospForm" style="display:none;">

var mapUserLat=null,mapUserLng=null;

},

);

function doMapSearch(){
var q=document.getElementById(‘mapSearchInput’).value.trim();
if(!q){showMapMsg(‘請輸入店名’);return;}
document.getElementById(‘mapModalTitle’).textContent=‘附近「’+q+’」’;
showMapLoading(‘搜尋中…’);
var locHint=mapUserLat?(‘目前位置：緯度’+mapUserLat.toFixed(4)+’，經度’+mapUserLng.toFixed(4)+’。’):’’;
var prompt=locHint+‘請搜尋附近最近的10個「’+q+’」店家，只回傳 JSON 陣列，格式：[{“name”:“店名”,“address”:“地址”,“distance”:“距離如120m或1.2km”}]，不要任何其他文字或 markdown。’;
fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({
model:‘claude-sonnet-4-20250514’,
max_tokens:1000,
tools:[{type:‘web_search_20250305’,name:‘web_search’}],
messages:[{role:‘user’,content:prompt}]
})
})
.then(function(r){return r.json();})
.then(function(data){
var text=’’;
(data.content||[]).forEach(function(b){if(b.type===‘text’)text+=b.text;});
text=text.trim();
var arr=null;
try{
// Try to find JSON array in response
var i1=text.indexOf(’[’),i2=text.lastIndexOf(’]’);
if(i1>=0&&i2>i1)arr=JSON.parse(text.slice(i1,i2+1));
else arr=JSON.parse(text);
}catch(ex){arr=null;}
if(arr&&arr.length)renderMapResults(arr,q);
else showFallback(q);
})
.catch(function(){showFallback(q);});
}

function showFallback(q){
var el=document.getElementById(‘mapResults’);el.innerHTML=’’;
var wrap=document.createElement(‘div’);wrap.className=‘map-no-result’;

var inp=document.createElement(‘input’);inp.className=‘finput’;inp.id=‘mapManualInput’;inp.placeholder=‘輸入店名…’;inp.value=q;inp.style.flex=‘1’;
var btn=document.createElement(‘button’);btn.style.cssText=‘background:var(–ac);color:#fff;border:none;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;’;

function renderMapResults(places,q){

if(!places||!places.length){showMapMsg(‘找不到「’+q+’」的店家’);return;}
places.slice(0,10).forEach(function(p){
var item=document.createElement(‘div’);item.className=‘map-result-item’;
