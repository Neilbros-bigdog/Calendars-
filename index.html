<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>行事曆</title>
<style>
/* ── FONTS embedded via @import (works on GitHub Pages) ── */
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

/* ════ MORANDI GREEN THEME ════ */
:root{
–bg:#cdd9d0;
–surface:#dce8de;
–surface2:#d4e1d6;
–surface3:#e8f1ea;
–border:#b8ccbc;
–border2:#a4bcaa;
–accent:#3a6b45;
–accent-light:#c6deca;
–text:#1c2d20;
–muted:#5c7a62;
–muted2:#8faa95;
–red:#b83232;
–today-ring:#3a6b45;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(–bg);color:var(–text);font-family:‘Noto Sans TC’,‘PingFang TC’,‘Microsoft JhengHei’,sans-serif;min-height:100vh;}

/* ════ LAYOUT ════ */
.page{display:flex;flex-direction:column;min-height:100vh;padding:24px 20px 60px;}

/* ── TOP CONTROLS ── */
.controls{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}

.month-block{display:flex;flex-direction:column;gap:3px;margin-right:auto;}
.label-tag{font-family:‘Syne’,‘PingFang TC’,sans-serif;font-size:13px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#b06000;display:flex;align-items:center;gap:7px;}
.label-tag::before{content:’’;width:16px;height:2.5px;background:#b06000;border-radius:2px;}
.month-title{font-family:‘Syne’,‘PingFang TC’,sans-serif;font-size:clamp(42px,5vw,68px);font-weight:800;line-height:1.1;letter-spacing:-.01em;color:#152a18;}
.month-title span{color:#2a6e38;}

.nav-group{display:flex;align-items:center;gap:8px;}
.nav-btn{height:40px;padding:0 18px;border:2px solid #5a9a60;background:#fff;color:#1a5020;border-radius:20px;cursor:pointer;font-family:‘Noto Sans TC’,‘PingFang TC’,sans-serif;font-size:15px;font-weight:700;transition:all .18s;box-shadow:0 2px 6px rgba(30,80,40,.1);}
.nav-btn:hover{border-color:#1a6030;color:#fff;background:#2a7040;}
.nav-btn.circle{width:40px;padding:0;border-radius:50%;font-size:18px;}

.quick-wrap{position:relative;}
.quick-trigger{display:flex;align-items:center;gap:6px;background:#fff8e6;border:2px solid #d4900a;color:#7a4800;height:40px;padding:0 18px;border-radius:20px;font-family:‘Noto Sans TC’,‘PingFang TC’,sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;box-shadow:0 2px 6px rgba(200,120,0,.12);}
.quick-trigger:hover,.quick-trigger.open{background:#d4900a;color:#fff;border-color:#a86800;}
.star{color:#d4900a;font-size:16px;}
.quick-dropdown{display:none;position:absolute;top:calc(100% + 7px);left:0;background:#fff;border:2px solid #d4900a;border-radius:12px;overflow:hidden;z-index:400;min-width:185px;box-shadow:0 8px 28px rgba(180,100,0,.18);}
.quick-dropdown.show{display:block;animation:fadeUp .14s ease;}
.quick-opt{padding:13px 20px;font-size:16px;font-weight:500;cursor:pointer;border-bottom:1px solid #f5e0b0;transition:background .12s;white-space:nowrap;color:#5a3800;}
.quick-opt:last-child{border-bottom:none;}
.quick-opt:hover{background:#fff3cc;color:#7a4800;}

.ov-group{display:flex;gap:14px;align-items:center;}
.ov-label{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-size:15px;font-weight:700;color:#2a5c30;}
.ov-label input[type=checkbox]{appearance:none;-webkit-appearance:none;width:20px;height:20px;border-radius:5px;border:2px solid #6aaa72;background:#fff;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0;}
.ov-label input:checked{background:#2a7040;border-color:#1a5028;}
.ov-label input:checked::after{content:‘✓’;position:absolute;inset:0;display:grid;place-items:center;font-size:12px;font-weight:900;color:#fff;}
.ov-label input:checked~span:not(.csg-logo):not(.asml-logo){color:#102818;font-weight:800;}
.csg-logo{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:3px;background:#fff;border:1px solid #b8ccbc;overflow:hidden;flex-shrink:0;padding:1px;}
.asml-logo{display:inline-flex;align-items:center;justify-content:center;height:22px;width:72px;background:#fff;border:1px solid #b8ccbc;border-radius:3px;overflow:hidden;flex-shrink:0;padding:2px 4px;}

/* ════ CALENDAR ════ */
.cal-wrap{flex:1;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.weekday{background:var(–surface3);text-align:center;padding:10px 0;font-family:‘Syne’,‘PingFang TC’,sans-serif;font-size:14px;font-weight:700;letter-spacing:.06em;color:var(–muted);border-radius:4px;}
.weekday:first-child,.weekday:last-child{color:var(–red);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{background:var(–surface);border:1.5px solid var(–border);border-radius:5px;min-height:clamp(120px,11vw,160px);padding:7px 7px 5px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:border-color .15s,background .15s;overflow:hidden;}
.day-cell:hover{border-color:var(–accent);background:var(–accent-light);}
.day-cell.other{background:var(–surface2);opacity:.75;}
.day-cell.other .day-num{color:var(–muted2);}
.day-cell.weekend .day-num{color:var(–red);}
.day-cell.holiday .day-num{color:var(–red);}
.day-cell.today{border-color:var(–accent);border-width:2px;}
.day-cell.today .day-num{background:var(–accent);color:#fff;}

.cell-head{display:flex;align-items:flex-start;gap:5px;margin-bottom:1px;flex-wrap:wrap;}
.day-num{font-family:‘Syne’,‘PingFang TC’,sans-serif;font-size:16px;font-weight:800;width:29px;height:29px;display:grid;place-items:center;border-radius:50%;flex-shrink:0;line-height:1;}
.hday-badge{display:inline-block;background:var(–red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;line-height:1.5;white-space:nowrap;align-self:center;}
.lunar{font-size:10px;color:var(–muted);line-height:1.3;padding-left:1px;}
.shift-pill{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0;white-space:nowrap;}
.evt-pill{font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.45;flex-shrink:0;color:#1a1a1a;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;}
.more{font-size:10px;color:var(–muted);padding-left:4px;}

/* ════ MODAL ════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,45,32,.45);z-index:600;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.modal{background:var(–surface3);border:1.5px solid var(–border2);border-radius:14px;width:100%;max-width:500px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(28,45,32,.22);animation:fadeUp .2s ease;}
.modal-hd{padding:18px 22px 14px;border-bottom:1.5px solid var(–border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;background:var(–surface3);border-radius:14px 14px 0 0;}
.modal-title{font-family:‘Syne’,‘PingFang TC’,sans-serif;font-weight:800;font-size:20px;color:var(–text);line-height:1.2;}
.modal-sub{font-size:13px;color:var(–muted);margin-top:3px;}
.modal-x{background:none;border:none;color:var(–muted);font-size:23px;cursor:pointer;line-height:1;flex-shrink:0;padding:0 2px;}
.modal-x:hover{color:var(–red);}
.modal-body{padding:16px 22px 22px;display:flex;flex-direction:column;gap:13px;overflow-y:auto;flex:1;background:var(–surface3);border-radius:0 0 14px 14px;}

.flabel{font-family:‘Syne’,‘PingFang TC’,sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(–accent);margin-bottom:5px;display:block;}
.sublabel{font-size:11px;color:var(–muted);margin-bottom:5px;display:block;}
.finput{width:100%;background:var(–surface);border:1.5px solid var(–border2);color:var(–text);padding:10px 13px;border-radius:7px;font-family:‘Noto Sans TC’,‘PingFang TC’,sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.finput:focus{border-color:var(–accent);}
select.finput{cursor:pointer;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.time-row{display:flex;gap:6px;align-items:center;}
.time-row select{flex:1;}
.time-colon{font-size:17px;color:var(–muted);font-weight:700;flex-shrink:0;}

.color-grid{display:flex;flex-wrap:wrap;gap:5px;}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0;display:grid;place-items:center;font-size:14px;font-weight:900;}
.cswatch:hover{transform:scale(1.2);}
.cswatch.sel{border-color:#333;transform:scale(1.15);}
.cswatch.sel::after{content:‘✓’;}

.evt-list{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto;}
.evt-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:7px;background:var(–surface);border:1.5px solid var(–border);cursor:pointer;}
.evt-item:hover{border-color:var(–accent);background:var(–accent-light);}
.ei-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ei-name{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ei-meta{font-size:11px;color:var(–muted);flex-shrink:0;}
.ei-del{background:none;border:none;color:var(–muted2);font-size:20px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;}
.ei-del:hover{color:var(–red);}

.hosp-form{background:var(–surface);border:1.5px solid var(–border);border-radius:9px;padding:13px;display:flex;flex-direction:column;gap:11px;}
.detail-card{background:var(–surface);border-radius:9px;padding:14px;border:1.5px solid var(–border);}
.drow{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.drow:last-child{margin-bottom:0;}
.dkey{font-family:‘Syne’,‘PingFang TC’,sans-serif;font-size:10px;font-weight:700;color:var(–muted);letter-spacing:.1em;min-width:50px;padding-top:2px;}
.dval{font-size:14px;color:var(–text);flex:1;}

.divider{height:1px;background:var(–border);}
.btn-ok{width:100%;background:var(–accent);color:#fff;border:none;padding:13px;border-radius:8px;font-family:‘Noto Sans TC’,‘PingFang TC’,sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:opacity .2s;flex-shrink:0;}
.btn-ok:hover{opacity:.87;}
.btn-del{width:100%;background:transparent;color:var(–muted);border:1.5px solid var(–border2);padding:11px;border-radius:8px;font-family:‘Noto Sans TC’,‘PingFang TC’,sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;}
.btn-del:hover{border-color:var(–red);color:var(–red);}
.range-del-label{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;background:#fff8f0;border:1.5px solid #f0b070;border-radius:8px;cursor:pointer;font-size:13px;color:#7a3800;line-height:1.5;}
.range-del-label input[type=checkbox]{appearance:none;-webkit-appearance:none;width:18px;height:18px;border-radius:4px;border:2px solid #e08030;background:#fff;cursor:pointer;position:relative;flex-shrink:0;margin-top:1px;transition:all .15s;}
.range-del-label input:checked{background:#d06820;border-color:#a04000;}
.range-del-label input:checked::after{content:‘✓’;position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:600px){
.day-cell{min-height:80px;padding:5px 4px;}
.day-num{font-size:13px;width:23px;height:23px;}
.evt-pill{font-size:9px;}
.lunar{display:none;}
.controls{gap:10px;}
}
</style>

</head>

const LD=['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
const LM=['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','臘月'];
const LB=new Date(2026,0,29);
const LMDAYS=[30,29,30,29,30,29,30,30,29,30,29,30];
function lunarOf(date){
  const diff=Math.round((date-LB)/86400000);
  if(diff<-30)return{txt:''};
  if(diff<0){const d2=30+diff;return d2>=0?{txt:LD[d2],isFirst:d2===0,month:'臘月'}:{txt:''};}
  let r=diff,mi=0;
  while(true){const md=LMDAYS[mi%12]||30;if(r<md)break;r-=md;mi++;if(mi>24)break;}
  return{txt:LD[Math.min(r,29)],isFirst:r===0,month:LM[mi%12]};
}

function csgOf(date){
  const diff=Math.floor((date-CSG_ANC)/86400000);
  const cn=Math.floor(diff/20);
  const pos=((diff%20)+20)%20;
  let si=-1;
  if(pos<=4)si=0; else if(pos>=6&&pos<=10)si=1; else if(pos>=13&&pos<=17)si=2;
  if(si<0)return{work:false};
  const base=((1-cn)%3+3)%3;
  return{work:true,shift:(base+si)%3};
}
// ASML: 3/31 = 休息第一天
const ASML_ANC=new Date(2026,2,31);
function asmlOf(date){
  const diff=Math.floor((date-ASML_ANC)/86400000);
  return{work:((diff%6)+6)%6>=3};
}

// ── 顏色選盤 ──
function luminance(hex){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const f=c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
}
function buildColors(gId){
  const g=document.getElementById(gId);g.innerHTML='';
  COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='cswatch'+(c===selClr?' sel':'');
    s.style.background=c;
    s.style.color=luminance(c)>0.35?'#1a1a1a':'#ffffff';
    s.onclick=()=>{selClr=c;g.querySelectorAll('.cswatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');};
    g.appendChild(s);
  });
}

// ── 取得當日所有事件 ──
function evtsFor(key){
  const{y,m,d}=pdk(key);
  const ts=new Date(y,m,d).getTime();
  const result=[];
  (evts[key]||[]).forEach((ev,i)=>result.push({ev,srcKey:key,srcIdx:i,isSpanning:false}));
  Object.keys(evts).forEach(k=>{
    if(k===key)return;
    (evts[k]||[]).forEach((ev,i)=>{
      if(!ev.endDate)return;
      const{y:sy,m:sm,d:sd}=pdk(k);
      const{y:ey,m:em,d:ed}=pdk(ev.endDate);
      if(ts>=new Date(sy,sm,sd).getTime()&&ts<=new Date(ey,em,ed).getTime())
        result.push({ev,srcKey:k,srcIdx:i,isSpanning:true});
    });
  });
  return result;
}

function build(){
  const y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('monthTitle').innerHTML=`${y} <span>${ZHM[m]}</span>`;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const fd=new Date(y,m,1).getDay();
  const dm=new Date(y,m+1,0).getDate();
  const dp=new Date(y,m,0).getDate();
  const tc=Math.ceil((fd+dm)/7)*7;

  for(let i=0;i<tc;i++){
    let dn,cy=y,cm=m,other=false;
    if(i<fd){dn=dp-fd+1+i;cm=m-1;if(cm<0){cm=11;cy--;}other=true;}
    else if(i-fd>=dm){dn=i-fd-dm+1;cm=m+1;if(cm>11){cm=0;cy++;}other=true;}
    else dn=i-fd+1;
    const cd=new Date(cy,cm,dn);
    const dow=i%7;
    const isToday=!other&&dn===TODAY.getDate()&&m===TODAY.getMonth()&&y===TODAY.getFullYear();
    const key=dk(cy,cm,dn);
    const hday=HOLIDAYS[key];

    const cell=document.createElement('div');
    cell.className='day-cell'+(other?' other':'')+(isToday?' today':'')+(dow===0||dow===6?' weekend':'')+(hday?' holiday':'');
    cell.onclick=()=>openDay(cy,cm,dn);

    // 日期 + 假日標籤
    const head=document.createElement('div');head.className='cell-head';
    const numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=dn;
    head.appendChild(numEl);
    if(hday&&!other){const hb=document.createElement('span');hb.className='hday-badge';hb.textContent=hday;head.appendChild(hb);}
    cell.appendChild(head);

    // 農曆
    if(!other){
      const lu=lunarOf(cd);
      if(lu.txt){const ll=document.createElement('div');ll.className='lunar';ll.textContent=lu.isFirst?lu.month:lu.txt;cell.appendChild(ll);}
    }

    // 輪班標籤
    if(ovCsg){
      const info=csgOf(cd);
      if(info.work){
        const b=document.createElement('div');b.className='shift-pill';
        b.style.cssText=`background:${SC_BG[info.shift]};color:${SC_C[info.shift]};border-left:2px solid ${SC_C[info.shift]};`;
        b.textContent=SN[info.shift];cell.appendChild(b);
      }
    }
    if(ovAsml){
      const info=asmlOf(cd);
      if(info.work){
        const b=document.createElement('div');b.className='shift-pill';
        b.style.cssText='background:rgba(2,132,199,.15);color:#0369a1;border-left:2px solid #0284c7;';
        b.textContent='上班';cell.appendChild(b);
      }
    }

    // 事件（最多5則）
    const dayEvts=evtsFor(key);
    dayEvts.slice(0,5).forEach(({ev})=>{
      const p=document.createElement('div');p.className='evt-pill';
      const lbl=(ev.type==='hospital')?('🏥'+(ev.hospital||ev.dept||'門診')):ev.name;
      p.style.cssText=`background:${ev.color};`;
      p.textContent=(lbl+(ev.time?' '+ev.time:'')).substring(0,15);
      cell.appendChild(p);
    });
    if(dayEvts.length>5){const more=document.createElement('div');more.className='more';more.textContent=`+${dayEvts.length-5} 更多`;cell.appendChild(more);}

    grid.appendChild(cell);
  }
}

// ══════════════════════════════════════════
// 新增事件 Modal
// ══════════════════════════════════════════
function openDay(y,m,d){
  activeDk=dk(y,m,d);
  const mL=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('mTitle').textContent=`${y}年 ${mL[m]} ${d}日`;
  const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  document.getElementById('evtS').value=ds;
  document.getElementById('evtE').value='';
  document.getElementById('evtE').min=ds;
  document.getElementById('evtHr').value='';document.getElementById('evtMn').value='';
  document.getElementById('evtType').value='normal';
  document.getElementById('evtName').value='';
  document.getElementById('nameRow').style.display='';
  document.getElementById('hospForm').style.display='none';
  document.getElementById('colorRow').style.display='';
  document.getElementById('timeRow').style.display='';
  document.getElementById('evtE').parentElement.style.display='';
  document.getElementById('hHosp').value='';
  document.getElementById('hOtherRow').style.display='none';
  document.getElementById('hDept').innerHTML='<option>— 請先選擇醫院 —</option>';document.getElementById('hDept').disabled=true;
  document.getElementById('hDoctor').innerHTML='<option>— 請先選擇科別 —</option>';document.getElementById('hDoctor').disabled=true;
  document.getElementById('hDept').style.display='';document.getElementById('hDeptText').style.display='none';document.getElementById('hDeptText').value='';
  document.getElementById('hDoctor').style.display='';document.getElementById('hDoctorText').style.display='none';document.getElementById('hDoctorText').value='';
  document.getElementById('hNum').value='';document.getElementById('hHr').value='';document.getElementById('hMn').value='';
  selClr=COLORS[0];buildColors('colorGrid');
  renderExist();
  document.getElementById('dayModal').classList.add('show');
  setTimeout(()=>document.getElementById('evtName').focus(),150);
}

function renderExist(){
  const sec=document.getElementById('existSec'),list=document.getElementById('evtList');
  const all=evtsFor(activeDk);
  list.innerHTML='';sec.style.display=all.length?'':'none';
  all.forEach(({ev,srcKey,srcIdx,isSpanning})=>{
    const item=document.createElement('div');item.className='evt-item';
    const dot=document.createElement('div');dot.className='ei-dot';dot.style.background=ev.color||'#2e7d6e';
    const name=document.createElement('div');name.className='ei-name';
    let label=(ev.type==='hospital')?('🏥 '+(ev.hospital||'門診')):ev.name;
    if(isSpanning)label='↔ '+label;
    name.textContent=label;
    const meta=document.createElement('div');meta.className='ei-meta';
    if(ev.time)meta.textContent=ev.time;
    if(ev.endDate)meta.textContent=(meta.textContent?meta.textContent+' ':'')+(srcKey+'→'+ev.endDate).replace(/\d{4}-/g,'').replace('-','/');
    const del=document.createElement('button');del.className='ei-del';del.textContent='×';
    del.onclick=e2=>{
      e2.stopPropagation();
      if(evts[srcKey]){evts[srcKey].splice(srcIdx,1);if(!evts[srcKey].length)delete evts[srcKey];}
      save();renderExist();build();
    };
    item.onclick=()=>openDetail(srcKey,srcIdx,activeDk);
    item.appendChild(dot);item.appendChild(name);item.appendChild(meta);item.appendChild(del);
    list.appendChild(item);
  });
}

document.getElementById('addBtn').onclick=()=>{
  const type=document.getElementById('evtType').value;
  const sDate=document.getElementById('evtS').value;
  const eDate=document.getElementById('evtE').value;
  const hr=document.getElementById('evtHr').value,mn=document.getElementById('evtMn').value;
  const time=(hr&&mn)?hr+':'+mn:'';
  let ev={color:selClr,time,type};
  if(eDate&&eDate>sDate)ev.endDate=eDate;

  if(type==='hospital'){
    const hv=document.getElementById('hHosp').value;
    const isOther=hv==='other';
    const hosp=isOther?document.getElementById('hOtherName').value.trim():(hv||'');
    if(!hosp){alert('請選擇或輸入醫院');return;}
    const dept=isOther?document.getElementById('hDeptText').value.trim():(document.getElementById('hDept').value||'').split('|')[1]||'';
    const doctor=isOther?document.getElementById('hDoctorText').value.trim():document.getElementById('hDoctor').value||'';
    const num=document.getElementById('hNum').value.trim();
    const hhr=document.getElementById('hHr').value,hmn=document.getElementById('hMn').value;
    const htime=(hhr&&hmn)?hhr+':'+hmn:'';
    ev={...ev,name:'醫院門診',hospital:hosp,dept,doctor,num,color:'#2e7d6e',time:htime||time,endDate:undefined};
  } else {
    const name=document.getElementById('evtName').value.trim();
    if(!name){alert('請輸入事件名稱');return;}
    ev={...ev,name};
  }

  const useKey=sDate||activeDk;
  if(!evts[useKey])evts[useKey]=[];
  evts[useKey].push(ev);
  save();
  if(sDate){const p=sDate.split('-');const nm=+p[1]-1;if(nm!==cur.getMonth()||+p[0]!==cur.getFullYear())cur=new Date(+p[0],nm,1);}
  build();closeDay();
};
document.getElementById('evtName').onkeydown=e=>{if(e.key==='Enter')document.getElementById('addBtn').click();};

function closeDay(){document.getElementById('dayModal').classList.remove('show');activeDk=null;}
document.getElementById('mClose').onclick=closeDay;
document.getElementById('dayModal').onclick=e=>{if(e.target===e.currentTarget)closeDay();};

// ══════════════════════════════════════════
// 詳情 Modal
// ══════════════════════════════════════════
function openDetail(srcKey,srcIdx,clickedKey){
  const ev=(evts[srcKey]||[])[srcIdx];if(!ev)return;
  detRef={srcKey,srcIdx,clickedKey};
  const{y,m,d}=pdk(clickedKey||srcKey);
  const mL=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('detTitle').textContent=(ev.type==='hospital')?'🏥 醫院門診':ev.name;
  document.getElementById('detSub').textContent=`${y}年 ${mL[m]} ${d}日`;
  const card=document.getElementById('detCard');card.innerHTML='';
  const rows=[];
  if(ev.type==='hospital'){
    if(ev.hospital)rows.push(['醫院',ev.hospital]);
    if(ev.dept)rows.push(['科別',ev.dept]);
    if(ev.doctor)rows.push(['醫師',ev.doctor]);
    if(ev.num)rows.push(['號碼',ev.num]);
  } else rows.push(['事件',ev.name]);
  if(ev.time)rows.push(['時間',ev.time]);
  if(srcKey!==clickedKey||ev.endDate){rows.push(['開始',srcKey]);if(ev.endDate)rows.push(['結束',ev.endDate]);}
  rows.forEach(([k,v])=>{
    const r=document.createElement('div');r.className='drow';
    r.innerHTML=`<div class="dkey">${k}</div><div class="dval">${v}</div>`;
    card.appendChild(r);
  });
  const isRange=ev.endDate&&ev.endDate!==srcKey;
  const rangeOpt=document.getElementById('detRangeOpt');
  document.getElementById('detDelRange').checked=false;
  if(isRange){rangeOpt.style.display='';document.getElementById('detRangeSpan').textContent=`${srcKey} → ${ev.endDate}`;}
  else rangeOpt.style.display='none';
  document.getElementById('detModal').classList.add('show');
}
document.getElementById('detClose').onclick=()=>document.getElementById('detModal').classList.remove('show');
document.getElementById('detModal').onclick=e=>{if(e.target===e.currentTarget)document.getElementById('detModal').classList.remove('show');};
document.getElementById('detDel').onclick=()=>{
  if(!detRef)return;
  const{srcKey,srcIdx,clickedKey}=detRef;
  const ev=(evts[srcKey]||[])[srcIdx];if(!ev)return;
  const delRange=document.getElementById('detDelRange').checked;
  const isRange=ev.endDate&&ev.endDate!==srcKey;
  if(!isRange||delRange){
    if(evts[srcKey]){evts[srcKey].splice(srcIdx,1);if(!evts[srcKey].length)delete evts[srcKey];}
  } else {
    const{y:sy,m:sm,d:sd}=pdk(srcKey);
    const{y:cy,m:cm,d:cd}=pdk(clickedKey);
    const{y:ey,m:em,d:ed}=pdk(ev.endDate);
    const startTs=new Date(sy,sm,sd).getTime();
    const clickTs=new Date(cy,cm,cd).getTime();
    const endTs=new Date(ey,em,ed).getTime();
    if(evts[srcKey]){evts[srcKey].splice(srcIdx,1);if(!evts[srcKey].length)delete evts[srcKey];}
    if(clickTs>startTs){
      const bk=dk(...[new Date(cy,cm,cd-1)].map(d=>[d.getFullYear(),d.getMonth(),d.getDate()]).flat());
      const evB={...ev};if(bk===srcKey)delete evB.endDate;else evB.endDate=bk;
      if(!evts[srcKey])evts[srcKey]=[];evts[srcKey].push(evB);
    }
    if(clickTs<endTs){
      const ak=dk(...[new Date(cy,cm,cd+1)].map(d=>[d.getFullYear(),d.getMonth(),d.getDate()]).flat());
      const evA={...ev};if(ak===ev.endDate)delete evA.endDate;else evA.endDate=ev.endDate;
      if(!evts[ak])evts[ak]=[];evts[ak].push(evA);
    }
  }
  save();document.getElementById('detModal').classList.remove('show');renderExist();build();
};

// ══════════════════════════════════════════
// 常用事件
// ══════════════════════════════════════════
document.getElementById('quickTrigger').onclick=()=>{
  document.getElementById('quickDropdown').classList.toggle('show');
  document.getElementById('quickTrigger').classList.toggle('open');
};
document.addEventListener('click',e=>{
  if(!document.getElementById('quickWrap').contains(e.target)){
    document.getElementById('quickDropdown').classList.remove('show');
    document.getElementById('quickTrigger').classList.remove('open');
  }
});
document.querySelectorAll('.quick-opt').forEach(opt=>{
  opt.onclick=()=>{
    pendingQ={name:opt.dataset.name,color:opt.dataset.color,type:opt.dataset.type};
    document.getElementById('quickDropdown').classList.remove('show');
    document.getElementById('quickTrigger').classList.remove('open');
    document.getElementById('qTitle').textContent=`新增「${pendingQ.name}」`;
    const t=TODAY;
    document.getElementById('qDate').value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const isHosp=pendingQ.type==='hospital';
    const isTime=pendingQ.type==='time';
    document.getElementById('qHospForm').style.display=isHosp?'':'none';
    document.getElementById('qTimeRow').style.display=isTime?'':'none';
    if(isHosp){
      document.getElementById('qHosp').value='';
      document.getElementById('qOtherRow').style.display='none';
      document.getElementById('qDept').innerHTML='<option>— 請先選擇醫院 —</option>';document.getElementById('qDept').disabled=true;
      document.getElementById('qDoctor').innerHTML='<option>— 請先選擇科別 —</option>';document.getElementById('qDoctor').disabled=true;
      document.getElementById('qDept').style.display='';document.getElementById('qDeptText').style.display='none';document.getElementById('qDeptText').value='';
      document.getElementById('qDoctor').style.display='';document.getElementById('qDoctorText').style.display='none';document.getElementById('qDoctorText').value='';
      document.getElementById('qNum').value='';document.getElementById('qHHr').value='';document.getElementById('qHMn').value='';
    }
    if(isTime){document.getElementById('qHr').value='';document.getElementById('qMn').value='';}
    document.getElementById('quickModal').classList.add('show');
  };
});
document.getElementById('qClose').onclick=()=>document.getElementById('quickModal').classList.remove('show');
document.getElementById('quickModal').onclick=e=>{if(e.target===e.currentTarget)document.getElementById('quickModal').classList.remove('show');};
document.getElementById('qConfirm').onclick=()=>{
  const val=document.getElementById('qDate').value;
  if(!val||!pendingQ)return;
  const[qy,qm,qd]=val.split('-').map(Number);
  const key=dk(qy,qm-1,qd);
  if(!evts[key])evts[key]=[];
  let ev={color:pendingQ.color,type:pendingQ.type};
  if(pendingQ.type==='hospital'){
    const hv=document.getElementById('qHosp').value;
    const isOther=hv==='other';
    const hosp=isOther?document.getElementById('qOtherName').value.trim():(hv||'');
    const dept=isOther?document.getElementById('qDeptText').value.trim():(document.getElementById('qDept').value||'').split('|')[1]||'';
    const doctor=isOther?document.getElementById('qDoctorText').value.trim():document.getElementById('qDoctor').value||'';
    const num=document.getElementById('qNum').value.trim();
    const hhr=document.getElementById('qHHr').value,hmn=document.getElementById('qHMn').value;
    const htime=(hhr&&hmn)?hhr+':'+hmn:'';
    ev={...ev,name:'醫院門診',hospital:hosp,dept,doctor,num,color:'#2e7d6e',time:htime};
  } else if(pendingQ.type==='time'){
    const qhr=document.getElementById('qHr').value,qmn=document.getElementById('qMn').value;
    ev={...ev,name:pendingQ.name,time:(qhr&&qmn)?qhr+':'+qmn:''};
  } else {
    ev={...ev,name:pendingQ.name};
  }
  evts[key].push(ev);
  save();cur=new Date(qy,qm-1,1);build();
  document.getElementById('quickModal').classList.remove('show');
};

// ══════════════════════════════════════════
// 導覽 + 輪班勾選
// ══════════════════════════════════════════
document.getElementById('prevBtn').onclick=()=>{cur.setMonth(cur.getMonth()-1);build();};
document.getElementById('nextBtn').onclick=()=>{cur.setMonth(cur.getMonth()+1);build();};
document.getElementById('todayBtn').onclick=()=>{cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);build();};
document.getElementById('ovCsg').onchange=function(){ovCsg=this.checked;build();};
document.getElementById('ovAsml').onchange=function(){ovAsml=this.checked;build();};

// ══════════════════════════════════════════
// 左右滑動切換月份
// ══════════════════════════════════════════
(function(){
  const wrap=document.querySelector('.cal-wrap');
  let sx=0,sy=0,st=0;
  wrap.addEventListener('touchstart',e=>{
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();
  },{passive:true});
  wrap.addEventListener('touchend',e=>{
    const t=e.changedTouches[0];
    const dx=t.clientX-sx,dy=t.clientY-sy,dt=Date.now()-st;
    if(dt<400&&Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0)cur.setMonth(cur.getMonth()+1);
      else cur.setMonth(cur.getMonth()-1);
      build();
    }
  },{passive:true});
})();

// 初始化
build();
